backend:
  name: git-gateway
  branch: main

# Local testing (uncomment to test locally without auth)
# local_backend: true

media_folder: public/images/blog
public_folder: /images/blog

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "blog-en"
    label: "Blog Posts (English)"
    folder: "content/blog/en"
    create: true
    slug: "{{slug}}"
    preview_path: "en/blog/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text", hint: "Brief description for SEO (150-160 characters)" }
      - { label: "Cover Image", name: "image", widget: "image", required: false, hint: "Featured image for blog listing" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
    editor:
      preview: false

  - name: "blog-et"
    label: "Blog Posts (Estonian)"
    folder: "content/blog/et"
    create: true
    slug: "{{slug}}"
    preview_path: "et/blog/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text", hint: "Brief description for SEO (150-160 characters)" }
      - { label: "Cover Image", name: "image", widget: "image", required: false, hint: "Featured image for blog listing" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
    editor:
      preview: false

  - name: "blog-fi"
    label: "Blog Posts (Finnish)"
    folder: "content/blog/fi"
    create: true
    slug: "{{slug}}"
    preview_path: "fi/blog/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text", hint: "Brief description for SEO (150-160 characters)" }
      - { label: "Cover Image", name: "image", widget: "image", required: false, hint: "Featured image for blog listing" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
    editor:
      preview: false
